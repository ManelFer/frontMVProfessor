<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de gestão de alunos</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>
    <div class="container">
        <div class="content">
            <!-- imagem do canto direito-->
            <div class="img"></div>

            <!-- form do canto esquerdo-->
            <div class="form">
                <p>V1.0</p>
                <h1>Begin</h1>
                <form action="">
                    <label for=""> Nome: </label>
                    <input type="text">

                    <label for=""> Email: </label>
                    <input type="text">

                    <label for=""> Senha: </label>
                    <input type="password">

                    <label for=""> Confirmar Senha: </label>
                    <input type="password">

                    <label for=""> Número de telefone: </label>
                    <input type="password">

                    <button type="submit">Login</button>
                </form>

                <div class="sub">
                    <p>Sou aluno</p>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
